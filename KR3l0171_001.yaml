body:
  text: 全一卷全一卷少蓬洪公作侍兒小名録好事者多傳焉王性之補録一卷意語盡矣余友溫彥幾復得一卷以授余曰他日觀書有可採者續録之乃作拾遺劉商少遊湘中秋月方皎忽見一畫水輿中有七八女子環麗容止若為呼盧戲其具俱布希世之寶前有紅蠟枝擎以金盤商駭訝未絶聞舟中語曰紫陽真人昨給劉商黃精二斤乃玉帝所餌之餘食之者為地仙一女子曰此人不遠可邀致之忽聞人呼商遂即舟邊拜一女子命侍兒楊孟珠斟一杯雲母漿商取飲一女子笑曰此人不固者無丹元氣耳因曰慎自精修去爾貪忍靈餌漸近天爵宜修復送之岸商覘之直至舜妃廟前落帆入廟黎明廟中得巴箋詩句後果得至人遺精服餌後不知所在樹萱録寇萊公有妾曰蒨桃公因會贈歌姬以束綾蒨桃作二詩呈公曰一曲清歌一束綾美人猶自意嫌輕不知織女螢窗下幾度拋梭織得成風徑衣單手屢呵幽窗軋軋度寒梭臘天日短不盈尺何似妖姬一曲歌公和曰將相功名終若何不堪急景似奔梭人間萬事何須問且向樽前聽豔歌翰府名談東坡寄柳子玉云聞道床頭惟竹幾夫人應不解卿卿又送竹幾與謝秀才云留我同行木上座贈君無語竹夫人蓋俗謂竹幾為夫人也山谷云竹夫人乃涼寢竹器憩臂休膝非夫人之職而冬夏青青竹之所長故名曰青奴嘗作詩曰穠李四絃風掃席昭華三弄月侵床我無紅袖堪娛夜正要青奴一味涼穠李昭華貴人家兩女奴也張文潛後作竹夫人傳玉直方詩話周昭王二十四年東甌獻二女一曰延娟一曰延嬋此二人辨口麗辭巧善歌笑步塵無跡行日中無影及昭王遊於漢水二女與王舟乘擁夾王身同溺於水故江漢之人到今思之立祠於江湄數十年間人於江漢之上猶見王與二女乘舟戲於水際燕昭王二年廣延國善舞者二人一名旋娟一名提漠並玉質凝膚體輕氣馥綽約而窈窕絶古無倫其舞一名縈塵次曰集羽末曰旋懷昭王知其神異處於崇霞之臺王好神仙之術玄天之女托形作此昭王之末莫知所在孫亮作琉璃屏風甚薄而瑩徹每於月下清夜舒之嘗與愛姬四人皆振古絶色一名朝妹二名麗居三名洛珍四名潔華使四人坐屏風內而外望之了如無隔惟香氣不通於外為四人合四氣香百浣不歇名曰百濯或以人名香每遊皆同輿席以前後為次所居室名為思香媚寢已上王子年拾遺記愛愛姓楊氏本錢唐倡家女年十五尚垂鬟性善歌舞幼學胡琴數曲遂能緣其聲以通其調泛舟西湖採荷香為金陵少年張逞所調遂相攜潛遁於京師逞家雄於財雅亦曉音律歲時嬉遊以犢車同載故鑾輅之幸琳館之闢雖遠必先雖暄必前京都偉麗之觀無不偕遊踰二年逞為父捕去不及與愛別留深巷中舍與豫家相鄰一日人傳逞死或往慰問其所愛愴然泣下曰是必虛語若果然亦不願他從故鄉道遠出非以禮必不能自還當死此舍自爾素服蔬膳日呱呱而泣不復親近樂器里之他婦欲往見之即反關不納好事有力者百計圖之終不可及愛姿體纖素豔發不類人間人後三年念逞之勤感疾而死小婢子錦兒今尚在出其繡手籍香囊纈履數物香皆郁然而新蘇子美愛愛集朝無咎之貶玉山也過彭門而陳履常廢居里中無咎出小鬟招奴舞梁州以佐酒履常作小闋木蘭花云娉娉裊裊芍藥稍頭紅樣小舞袖低回心到郎邊客已知金樽玉酒勸我花前千萬壽莫莫休休白髮簪花我自羞無咎云人疑宋開府鐵心石腸及為梅花賦清便豔發殆不類其為人履常清通雖鐵心石腸不至於開府而此詞清便豔發過於梅花賦矣無咎記李良四事東坡朝雲墓志銘云東坡先生侍妾曰朝雲字子霞姓王氏錢塘人敏而好義事先生二十有三年忠敬若一生子遁未而夭有戲贈朝雲詩云不學楊枝別樂天恰如通德伴伶玄伯仁絡秀不同老天女維摩總解禪經卷藥爐新活計舞裙歌扇舊因緣丹成逐我三山去不作巫陽雲雨仙本集漢武帝所幸宮人麗娟年十四玉膚柔吹氣如蘭娟身輕弱不欲衣纓拂之恐傷為痕每歌李延年和之於芝生殿旁唱風之曲庭中樹為之翻落常致娟於琉璃帳恐垢污體也常以衣帶繫娟袂閉於重幕中恐隨風起娟以琥珀佩置衣中不使人知乃言娟骨節自鳴相與為神怪也洞冥記隋煬帝宮妃吳降仙善畫長娥眉帝甚憐之由是嬪御皆倣此宮吏日供螺子黛五斛名娥緑而進之帝每倚簾顧之移時不去乃云古人言美色若可食如降仙者可以療饑矣遂賜以合歡水果降仙以謝帝立為貴妃後與妃同遊汴河彩舟為龍張帆以錦飾木剪花日縱淫樂遂廢國祗大業拾遺呂不韋陽翟人也家纍千金商賈於邯鄲娶劉氏女名曰諸姬善舞時秦昭王太子之孫子楚質於趙見諸姬心悅之從不韋索之不韋與之時已懷妊兩月及子楚立為哀王生始皇始皇即不韋之遺體也史記周瑜初從孫策攻拔之時獲喬公兩女皆國色也策自納大喬瑜納小喬江表傳策從容戲瑜曰喬公二女雖流離得吾二人作壻亦足為歡吳志秦穆公女名弄玉善吹簫與蕭史共登樓吹簫作鳳凰音感鳳凰從天而降後升天矣帝王世記越王勾踐陰謀吳乃得國中苧蘿山鬻薪之女曰西施飾以羅縠教以容步三年使范蠡進於吳夫差大悅吳越春秋國初朝廷遣陶穀使江南以假書為名實使覘之丞國李獻以書抵韓熙載曰五柳公驕甚其善待之穀至則果如李所言熙載謂所親曰陶秀實非端介者其守可隳當使諸君一笑因令宿謄六朝書半年乃畢熙載使歌姬秦蒻蘭衣弊衣為驛卒女穀見之而喜遂犯慎獨之戒作長短句贈之明日中主燕客穀凜然不可犯中主持觥立使蒻蘭出歌續斷絃之曲侑觴穀大慚而罷詞名風光好好因緣惡因緣秪得郵亭一夜眠別神仙琵琶撥盡相思調知音少再把鸞膠續斷絃是何年冷齊夜話秦少游在蔡州與營妓婁婉字東玉者甚密贈之詞云小樓連苑橫空又云玉佩丁東別後者是也又贈云天外一鉤橫月帶三星謂心字也高齊詩話楊貴妃小字玉環明皇雜録白公杭州春詩云柳色初藏蘇小家本朝賢良馬槱嘗夢一美人謂之曰妾幼以姿色名冠天下而身無所依輒有小詞浼瀆其詞有妾本錢唐江上住之句及後得錢唐幕官而蘇小墓乃見公宇之後雲齊廣録真娘吳中樂妓墓在虎丘山路傍白樂天李商詩唐元載末年納薛瑤英處以金絲帳卻塵褥衣以龍純衣一襲無一兩載以瑤英體輕不勝重衣於異國求此服也詩話唐杜秋娘金陵女子也年十五為浙西觀察使李錡妾嘗為錡辭云勸君莫惜金縷衣勸君莫惜少年時有花堪折君須折莫待花殘空折枝長慶中裴航游襄漢與樊夫人同舟樊贈詩云一飲瓊漿百感生玄霜搗盡見雲英藍橋便是神仙宅何必區區上玉京航後經藍橋驛遇仙女雲英遂娶之後俱得仙並傳奇五代時有一僧號至聰禪師祝融峰修行十年自以為戒行具足無所誘掖也夫何一日下山於道傍見一美人號紅蓮一瞬而動遂與合歡至明僧起沐浴與婦人俱化有頌曰有道山僧號至聰十年不下祝融峰腰間所積菩提水瀉向紅蓮一葉中古今詩話王魁遇桂英於萊州北市深巷桂英酌酒求詩於魁魁時下第桂英曰君但為學四時所須我為辦之由是魁朝去暮來踰年有詔求賢桂為辨西遊之用將行往州北望海神廟盟曰吾與桂英誓不相負若生離異神當殛之魁後唱第為天下第一魁父約崔氏為親授徐州僉判桂英不之知乃喜曰徐去此不遠當使人迎我矣遣僕持書魁方坐廳決事大怒叱書不受桂英曰魁負我如此當以死報之揮刀自刎魁在南都試院有人自燭下出乃桂英也魁曰汝固無恙乎桂英曰君輕恩薄義負誓渝盟使我至此魁曰我之罪也為汝飯僧誦佛書多焚紙錢捨我可乎桂英曰得君之命即止不知其他後魁竟死托遺
